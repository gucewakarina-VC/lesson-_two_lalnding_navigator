<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="AI-бюро «Навигатор» — внедряем нейросети, AI-агентов и автоматизацию для малого бизнеса.">
  <title>AI-бюро «Навигатор» — внедряем нейросети в ваш бизнес</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Переключение темы: ранняя установка до отрисовки страницы -->
  <script>
    (function () {
      var storageKey = 'navigator_theme';
      var savedTheme = null;
      try {
        savedTheme = localStorage.getItem(storageKey);
      } catch (e) {
        savedTheme = null;
      }
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
